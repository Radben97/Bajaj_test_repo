<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BFHL hierarchy viewer</title>
    <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #38bdf8;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    textarea {
      width: 100%;
      height: 100px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      background: #38bdf8;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #0ea5e9;
    }

    .error {
      color: #f87171;
      margin-top: 10px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin-top: 15px;
      border-radius: 10px;
    }

    .tree {
      margin-left: 20px;
    }

    .node {
      margin: 4px 0;
      display: flex;
      align-items: center;
    }

    .connector {
      display: inline-block;
      width: 24px;
      height: 100%;
      min-height: 20px;
      position: relative;
      margin-right: 4px;
    }

    .connector::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      height: 0;
      border-top: 2px dotted #38bdf8;
    }

    .connector::after {
      content: "▶";
      position: absolute;
      right: -2px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 10px;
      color: #38bdf8;
    }

    .label {
      color: #e2e8f0;
    }

    .summary {
      background: #334155;
      padding: 10px;
      border-radius: 8px;
      margin-top: 15px;
    }
  </style>
</head>
<body>
    <div class="container">
    <h1>Hierarchy Analyzer</h1>

    <textarea id="input" placeholder='Enter nodes like: A->B, A->C, B->D'></textarea>
    <button onclick="submitData()">Submit</button>

    <div id="error" class="error"></div>
    <div id="output"></div>
  </div>

  <script>
    const API_URL = "/bfhl"; // change when deployed

    function parseInput(input) {
      return input.split(",").map(s => s.trim()).filter(Boolean);
    }

    async function submitData() {
      const input = document.getElementById("input").value;
      const errorDiv = document.getElementById("error");
      const outputDiv = document.getElementById("output");

      errorDiv.textContent = "";
      outputDiv.innerHTML = "";

      const data = parseInput(input);

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ data })
        });

        if (!res.ok) throw new Error("API Error");

        const result = await res.json();
        renderResult(result);

      } catch (err) {
        errorDiv.textContent = "Failed to fetch data. Check API or CORS.";
      }
    }

    function renderResult(data) {
      const output = document.getElementById("output");

      // --- Hierarchies ---
      data.hierarchies.forEach(h => {
        const card = document.createElement("div");
        card.className = "card";

        let html = `<strong>Root:</strong> ${h.root}<br>`;

        if (h.has_cycle) {
          html += `<span style="color:red">Cycle detected</span>`;
        } else {
          html += `<strong>Depth:</strong> ${h.depth}`;
          html += renderTree(h.tree);
        }

        card.innerHTML = html;
        output.appendChild(card);
      });

      // --- Invalid Entries ---
      if (data.invalid_entries.length) {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `<strong>Invalid Entries:</strong> ${data.invalid_entries.join(", ")}`;
        output.appendChild(div);
      }

      // --- Duplicate Edges ---
      if (data.duplicate_edges.length) {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `<strong>Duplicate Edges:</strong> ${data.duplicate_edges.join(", ")}`;
        output.appendChild(div);
      }

      // --- Summary ---
      const summary = document.createElement("div");
      summary.className = "summary";

      summary.innerHTML = `
        <strong>Summary</strong><br>
        Trees: ${data.summary.total_trees}<br>
        Cycles: ${data.summary.total_cycles}<br>
        Largest Root: ${data.summary.largest_tree_root}
      `;

      output.appendChild(summary);
    }

    function renderTree(tree) {
      let html = '<div class="tree">';

      function traverse(obj, isLast) {
        const keys = Object.keys(obj);
        keys.forEach((key, index) => {
          const isLastNode = index === keys.length - 1;
          const hasChildren = Object.keys(obj[key]).length > 0;
          
          html += `<div class="node">`;
          html += `<span class="connector"></span>`;
          html += `<span class="label">${key}</span>`;
          html += `</div>`;
          
          if (hasChildren) {
            html += '<div class="tree">';
            traverse(obj[key], isLastNode);
            html += '</div>';
          }
        });
      }

      traverse(tree, true);
      html += '</div>';
      return html;
    }
  </script>

</body>
</html>
